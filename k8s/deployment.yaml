apiVersion: apps/v1
kind: Deployment
metadata:
  name: digital-twin-lab
  namespace: digital-twin-simulation-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: digital-twin-lab
  template:
    metadata:
      labels:
        app: digital-twin-lab
    spec:
      containers:
        - name: api
          image: digital-twin-lab:latest
          command: ["uvicorn", "digital_twin_lab.main:app", "--host", "0.0.0.0", "--port", "8017"]
          ports:
            - containerPort: 8017
          env:
            - name: APP_ENV
              value: production
            - name: APP_PORT
              value: "8017"
