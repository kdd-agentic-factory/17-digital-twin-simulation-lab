name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  python-ci:
    uses: kdd-agentic-factory/12-ci-cd-security/.github/workflows/reusable-python-ci.yml@main
    with:
      python-version: "3.12"

  security:
    uses: kdd-agentic-factory/12-ci-cd-security/.github/workflows/reusable-security-scan.yml@main

  docker:
    needs: python-ci
    uses: kdd-agentic-factory/12-ci-cd-security/.github/workflows/reusable-docker-build.yml@main
    with:
      image-name: digital-twin-simulation-lab
      push: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
    secrets:
      registry-token: ${{ secrets.GITHUB_TOKEN }}
