name: CI

on:
  pull_request:
  push:
    branches:
      - main

# NOTE: reusable workflows from the private 12-ci-cd-security repo are NOT
# resolvable from public repos (runs die at compile time with 0 jobs, run name
# falls back to the workflow path). Docker job is therefore inlined here, same
# pattern as 04/05's standalone docker-build.yml. Restore the reusables if
# 12-ci-cd-security is ever made public.
jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/kdd-agentic-factory/digital-twin-simulation-lab
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
