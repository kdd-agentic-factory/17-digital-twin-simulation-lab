app = "kdd-rjz-digital-twin"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8170
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[checks.health]
  type = "http"
  port = 8170
  method = "get"
  path = "/health"
  interval = "30s"
  timeout = "5s"
  grace_period = "20s"

# Fly's managed Prometheus scrapes this → dashboards at fly-metrics.net (Grafana).
[metrics]
  port = 8170
  path = "/metrics"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
